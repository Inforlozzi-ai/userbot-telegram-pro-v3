version: "3.9"

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (BullMQ) ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ── API NestJS ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:         ${DATABASE_URL}
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      JWT_SECRET:           ${JWT_SECRET}
      CRYPTO_KEY:           ${CRYPTO_KEY}
      DOCKER_IMAGE:         ${DOCKER_IMAGE}
      ASAAS_API_KEY:        ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_TOKEN:  ${ASAAS_WEBHOOK_TOKEN}
      ASAAS_PLAN_STARTER:   ${ASAAS_PLAN_STARTER}
      ASAAS_PLAN_PRO:       ${ASAAS_PLAN_PRO}
      ASAAS_PLAN_AGENCY:    ${ASAAS_PLAN_AGENCY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`seudominio.com.br`) && PathPrefix(`/api`, `/webhooks`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  # ── Web Next.js ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      INTERNAL_API_URL:    http://api:3001
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`seudominio.com.br`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ── Traefik (reverse proxy + SSL automático) ─────────────────────────────────
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=seu@email.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
