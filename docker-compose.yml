services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inforlozzi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inforlozzi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - minha_rede
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inforlozzi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - minha_rede

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CRYPTO_KEY: ${CRYPTO_KEY}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      NOTIFY_BOT_TOKEN: ${NOTIFY_BOT_TOKEN}
      DOCKER_IMAGE: ${DOCKER_IMAGE:-inforlozzi/userbot-v3:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - minha_rede
    labels:
      - traefik.enable=true
      - traefik.docker.network=minha_rede
      - traefik.http.routers.inforlozzi-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`))
      - traefik.http.routers.inforlozzi-api.entrypoints=websecure
      - traefik.http.routers.inforlozzi-api.tls=true
      - traefik.http.routers.inforlozzi-api.tls.certresolver=letsencrypt
      - traefik.http.services.inforlozzi-api.loadbalancer.server.port=3001

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
    depends_on:
      - api
    networks:
      - minha_rede
    labels:
      - traefik.enable=true
      - traefik.docker.network=minha_rede
      - traefik.http.routers.inforlozzi-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.inforlozzi-web.entrypoints=websecure
      - traefik.http.routers.inforlozzi-web.tls=true
      - traefik.http.routers.inforlozzi-web.tls.certresolver=letsencrypt
      - traefik.http.services.inforlozzi-web.loadbalancer.server.port=3000

volumes:
  pgdata:
  redisdata:

networks:
  minha_rede:
    external: true
